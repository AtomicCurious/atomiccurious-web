```yaml
name: Keep Supabase awake

on:
  schedule:
    - cron: "17 15 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Call keepalive endpoint
        env:
          KEEPALIVE_SECRET: ${{ secrets.KEEPALIVE_SECRET }}
        run: |
          curl --fail-with-body \
            --silent \
            --show-error \
            --max-time 60 \
            --header "Authorization: Bearer $KEEPALIVE_SECRET" \
            "https://atomiccurious.com/api/keepalive"
```
